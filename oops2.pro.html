<!DOCTYPE html>
<html>
<head>
<title>Employee Payroll System</title>

<style>
body{
font-family: Arial;
background: linear-gradient(135deg,#141e30,#243b55);
text-align:center;
color:white;
overflow:hidden;
}

/* 3D floating shapes */
body::before, body::after{
content:"";
position:absolute;
width:300px;
height:300px;
background: linear-gradient(135deg,#00f2fe,#4facfe);
border-radius:50%;
opacity:0.3;
filter: blur(50px);
animation: float 6s infinite alternate;
}

body::before{
top:-100px;
left:-100px;
}

body::after{
bottom:-100px;
right:-100px;
animation-delay:2s;
}

@keyframes float{
from{transform: translateY(0px);}
to{transform: translateY(40px);}
}

.container{
background: rgba(255,255,255,0.95);
color:black;
width:400px;
margin:auto;
padding:25px;
border-radius:15px;

/* 3D glass effect */
box-shadow: 
0px 10px 30px rgba(0,0,0,0.5),
inset 0px 0px 10px rgba(255,255,255,0.5);

backdrop-filter: blur(10px);
transform: perspective(1000px) rotateX(5deg);
transition: 0.3s;
}

.container:hover{
transform: perspective(1000px) rotateX(0deg) scale(1.03);
}

input{
width:90%;
padding:10px;
margin:6px;
border-radius:8px;
border:1px solid #ccc;
outline:none;
}

input:focus{
border-color:#4facfe;
box-shadow:0px 0px 5px #4facfe;
}

button{
padding:10px 15px;
background: linear-gradient(135deg,#4facfe,#00f2fe);
border:none;
color:white;
border-radius:8px;
cursor:pointer;
font-weight:bold;
box-shadow:0px 5px 10px rgba(0,0,0,0.3);
transition:0.3s;
}

button:hover{
transform: translateY(-2px);
box-shadow:0px 8px 20px rgba(0,0,0,0.4);
}

#result{
margin-top:15px;
font-weight:bold;
}

h1{
text-shadow: 0px 5px 15px rgba(0,0,0,0.6);
}
</style>

<script>
function calculateSalary(){

let name=document.getElementById("name").value;
let id=document.getElementById("id").value;
let basic=parseFloat(document.getElementById("salary").value);
let performance=parseInt(document.getElementById("performance").value);

let hra=basic*0.20;
let da=basic*0.10;
let bonus=0;

if(performance>=90){
bonus=basic*0.20;
}
else if(performance>=70){
bonus=basic*0.10;
}
else{
bonus=0;
}

let tax=basic*0.05;

let netSalary=basic+hra+da+bonus-tax;

document.getElementById("result").innerHTML=
"Employee Name: "+name+"<br>"+
"Employee ID: "+id+"<br>"+
"Basic Salary: "+basic+"<br>"+
"HRA: "+hra+"<br>"+
"DA: "+da+"<br>"+
"Performance Bonus: "+bonus+"<br>"+
"Tax Deduction: "+tax+"<br>"+
"<h3>Net Salary: "+netSalary+"</h3>";
}
</script>
</head>

<body>

<h1>Employee Payroll System</h1>

<div class="container">

<input type="text" id="name" placeholder="Employee Name">

<input type="text" id="id" placeholder="Employee ID">

<input type="number" id="salary" placeholder="Basic Salary">

<input type="number" id="performance" placeholder="Performance Score (0-100)">

<button onclick="calculateSalary()">Calculate Payroll</button>

<div id="result"></div>

</div>

</body>
</html>
